{% extends 'legaltexts/base.html' %}
{% block content %}
<div class="form-wrapper">
    <h1>Confirm delete</h1>
    <p>Are you sure you want to delete: <strong>{{ object }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button class="danger-button" type="submit">Yes, delete</button>
        <a class="secondary" href="javascript:history.back()">Cancel</a>
    </form>
</div>
{% endblock %}
