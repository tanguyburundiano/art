{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal Texts Platform</title>
    <link rel="stylesheet" href="{% static 'legaltexts/css/style.css' %}">
</head>
<body>
<header class="topbar">
    <div class="brand"><a href="{% url 'article_list' %}">Legal Texts Platform</a></div>
    <nav>
        {% if user.is_authenticated %}
            <a href="{% url 'article_list' %}">Articles</a>
            {% if user.is_staff %}<a href="{% url 'dashboard' %}">Staff Dashboard</a>{% endif %}
            <form method="post" action="{% url 'logout' %}" class="inline-form">{% csrf_token %}<button class="link-button">Logout</button></form>
        {% endif %}
    </nav>
</header>
<main class="container">
    {% if messages %}
        {% for message in messages %}<div class="message">{{ message }}</div>{% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
</main>
<script>
function copyArticle(articleId) {
    const element = document.getElementById('article-copy-' + articleId);
    const text = element ? element.innerText : '';
    navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copy-btn-' + articleId);
        if (btn) {
            const old = btn.innerText;
            btn.innerText = 'Copied';
            setTimeout(() => btn.innerText = old, 1200);
        }
    });
}
</script>
</body>
</html>
